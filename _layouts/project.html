---
layout: page
---

<link rel="stylesheet" href="/assets/css/section-header.css">
<link rel="stylesheet" href="/assets/css/gruvbox.css">

<style>
  .post-content {
    font-family: 'Trebuchet MS', Arial, sans-serif;
    font-size: 16;
  }

  .post-content p code {
    background: #eee;
    color: #555;

    padding: 2px 4px;
    border-radius: 4px;

    font-family: 'JetBrains Mono', monospace;
    font-size: 14;
  }

  .post-content .highlight {
    border-radius: 12px;
    margin: 8px;
  }

  .post-content pre {
    padding: 12px 20px;
  }
</style>

{% include section-header.html title="Projects" %}

<div class="post">
  <h1>{{ page.title }}</h1>
  {% include project-tags.html tags=page.tags %}
  <div class="post-content">
    {{ content }}
  </div>
</div>

<script>
document.querySelectorAll('.post-content a').forEach(a => {
  a.setAttribute('target', '_blank');
  a.setAttribute('rel', 'noopener noreferrer');
});
</script>
