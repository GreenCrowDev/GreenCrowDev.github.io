<div class="project-card" style="--bg: url('{{ include.project.image }}')">
  <div class="gradient"></div>
  <div class="content">
    <div class="title">
      <h3>{{ include.project.title }}</h3>
    </div>

    <div class="extra">
      <div class="project-tags">
        {% for tag in include.project.tags %}
          <span class="tag">{{ tag | upcase }}</span>
        {% endfor %}
      </div>

      <p class="desc">{{ include.project.description }}</p>
    </div>
  </div>
</div>
