<a class="project-card" href="{{ include.project.url }}" style="--bg: url('{{ include.project.image }}')">
  <div class="gradient"></div>
  <div class="content">
    <h3 class="project-title">{{ include.project.title }}</h3>

    <div class="extra">
      {% include project-tags.html tags=include.project.tags %}
      <p class="project-description">{{ include.project.description }}</p>
    </div>
  </div>
</a>
