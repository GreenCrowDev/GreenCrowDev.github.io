<a class="project-card-horizontal" href="{{ include.project.url }}" style="--bg: url('{{ include.project.image }}')">
  <div class="project-image"></div>
  <div class="content">
    <h3 class="project-title">{{ include.project.title }}</h3>

    <div class="extra">
      <div class="project-tags">
        {% for tag in include.project.tags %}
          <span class="tag tag-{{ tag | downcase }}">{{ tag | upcase }}</span>
        {% endfor %}
      </div>

      <p class="project-description">{{ include.project.description }}</p>
    </div>
  </div>
</a>
